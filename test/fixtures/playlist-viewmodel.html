<!--
  ViewModel Architecture Fixture
  Mimics a YouTube playlist page using the new yt-*-view-model and badge-shape layout.
  No ytd-playlist-video-list-renderer — desyncIndicators detects "viewmodel".
  Used by: discovery strategy-structural-invariant, extraction strategy-content-pattern

  IMPORTANT: Each yt-lockup-view-model is wrapped in its own per-video DIV,
  matching the real YouTube DOM. The shared insertion container that holds
  all lockups is the div#contents two levels above each lockup, NOT the
  lockup's direct parentElement (which holds exactly one lockup). Tests
  that resolve the live container from a snapshot lockup must use
  closest('#contents'), not parentElement.
-->
<html>
<body>
  <yt-section-list-renderer>
    <div id="contents">
      <div>
        <yt-lockup-view-model>
          <a id="video-title" title="Getting started guide">Getting started guide</a>
          <badge-shape>
            <span>12:34</span>
          </badge-shape>
        </yt-lockup-view-model>
      </div>
      <div>
        <yt-lockup-view-model>
          <a id="video-title" title="Intermediate patterns">Intermediate patterns</a>
          <badge-shape>
            <span>25:00</span>
          </badge-shape>
        </yt-lockup-view-model>
      </div>
      <div>
        <yt-lockup-view-model>
          <a id="video-title" title="Master class">Master class</a>
          <badge-shape>
            <span>1:15:30</span>
          </badge-shape>
        </yt-lockup-view-model>
      </div>
      <div>
        <yt-lockup-view-model>
          <a id="video-title" title="Tips and tricks">Tips and tricks</a>
          <badge-shape>
            <span>8:45</span>
          </badge-shape>
        </yt-lockup-view-model>
      </div>
      <div>
        <yt-lockup-view-model>
          <a id="video-title" title="Final review">Final review</a>
          <badge-shape>
            <span>3:20</span>
          </badge-shape>
        </yt-lockup-view-model>
      </div>
    </div>
  </yt-section-list-renderer>
</body>
</html>
